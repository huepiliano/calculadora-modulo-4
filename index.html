<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Módulo 4</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;

            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        }

            font-size: 0.95rem;
            color: #666;

    <div class="container">
        <h1>Calculadora - Aplicación en Consola</h1>
        <p>Proyecto desarrollado en JavaScript.</p>
        <p>La interacción se realiza desde la consola del navegador.</p>
        <p class="highlight">Presiona F12 → pestaña "Console".</p>
    </div>

    <script src="script.js"></script>
